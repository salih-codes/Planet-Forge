name: "Publish Release"

# Cuts a cross-platform desktop release. Push a version tag (e.g. `v0.1.0`) to
# build macOS, Linux and Windows installers and publish them to a GitHub Release.
# Can also be run manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Apple Silicon (arm64)
          - platform: "ubuntu-22.04"
          - platform: "windows-latest"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./apps/web/src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      # Compile the Python physics engine into a self-contained executable and
      # place it where Tauri expects the sidecar: a binary suffixed with the
      # platform's Rust target triple (see externalBin in tauri.conf.json).
      - name: Bundle Python simulation sidecar
        shell: bash
        run: |
          cd apps/sim
          uv sync
          uv run pyinstaller --clean --onefile --name planet-sim sim/main.py

          TRIPLE=$(rustc -Vv | grep host | cut -d' ' -f2)
          echo "Target triple: $TRIPLE"
          mkdir -p ../web/src-tauri/binaries

          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            cp dist/planet-sim.exe "../web/src-tauri/binaries/planet-sim-$TRIPLE.exe"
          else
            cp dist/planet-sim "../web/src-tauri/binaries/planet-sim-$TRIPLE"
          fi

          # Ad-hoc code-sign the sidecar on macOS. Without a valid signature on a
          # nested binary, the whole .app fails Gatekeeper's check and reports
          # "is damaged" on Apple Silicon once it's been quarantined (downloaded).
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            codesign --force --sign - "../web/src-tauri/binaries/planet-sim-$TRIPLE"
          fi

      - name: Install JS dependencies
        run: bun install

      # Build the GitHub Release body: the matching CHANGELOG.md section for this
      # tag, followed by per-OS install notes. Runs on every matrix job but only
      # the one that first creates the release applies its body.
      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SECTION=""
          if [ -f CHANGELOG.md ]; then
            SECTION=$(awk -v v="$VERSION" '
              index($0, "## [" v "]") == 1 { flag=1; next }
              /^## \[/ { flag=0 }
              flag { print }
            ' CHANGELOG.md)
          fi
          {
            echo "body<<__NOTES_EOF__"
            if [ -n "$SECTION" ]; then
              printf '%s\n\n' "$SECTION"
            fi
            echo '### Install notes'
            echo '- **macOS** (ad-hoc signed, not notarized): right-click the app → **Open**, then **Open** again — or System Settings → Privacy & Security → **Open Anyway**. If macOS still blocks it, run `xattr -dr com.apple.quarantine "/Applications/Planet Forge.app"`.'
            echo '- **Windows**: on the SmartScreen prompt click **More info → Run anyway**.'
            echo '- **Linux**: `.AppImage` (`chmod +x` then run), `.deb`, or `.rpm`.'
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      # tauri-action runs the frontend build (beforeBuildCommand), compiles the
      # Rust core, bundles the sidecar, and uploads the installers to a Release.
      - name: Build desktop app & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/web
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v0.0.0-build.{0}', github.run_number) }}
          releaseName: "Planet Forge ${{ github.ref_type == 'tag' && github.ref_name || format('(build {0})', github.run_number) }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
